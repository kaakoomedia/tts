<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <title>Generate Speech</title>
  <link rel="stylesheet" href="./style/style.css" />
</head>

<body>

<div class="app">

  <div class="header">
    <h1>Generate Speech</h1>

    <div class="top-actions">
      <span>🌐 EN</span>
      <span>⚙</span>
    </div>
  </div>

  <div class="main-layout">

    <section class="left-panel">

      <div class="voice-row">
        <label>Character Voice</label>

        <div class="voice-list" id="voiceList">

          <div class="voice-group-title">Khmer Male Voices</div>

          <div class="voice-item active" data-voice="Kore" data-name="Bora">
            <span>Bora (Calm)</span>
            <button class="play-btn" type="button">▶</button>
          </div>

          <div class="voice-item" data-voice="Puck" data-name="Tola">
            <span>Tola (Deep)</span>
            <button class="play-btn" type="button">▶</button>
          </div>

          <div class="voice-item" data-voice="Charon" data-name="Dara">
            <span>Dara (Energetic)</span>
            <button class="play-btn" type="button">▶</button>
          </div>

          <div class="voice-item" data-voice="Fenrir" data-name="Sokha">
            <span>Sokha (Wise)</span>
            <button class="play-btn" type="button">▶</button>
          </div>

          <div class="voice-item" data-voice="Orus" data-name="Rithy">
            <span>Rithy (Reporter)</span>
            <button class="play-btn" type="button">▶</button>
          </div>

          <div class="voice-group-title">Khmer Female Voices</div>

          <div class="voice-item" data-voice="Leda" data-name="Theary">
            <span>Theary (Warm)</span>
            <button class="play-btn" type="button">▶</button>
          </div>

          <div class="voice-item" data-voice="Aoede" data-name="Maly">
            <span>Maly (Emotional)</span>
            <button class="play-btn" type="button">▶</button>
          </div>

          <div class="voice-item" data-voice="Callirrhoe" data-name="Nary">
            <span>Nary (Elegant)</span>
            <button class="play-btn" type="button">▶</button>
          </div>

          <div class="voice-item" data-voice="Autonoe" data-name="Sreyka">
            <span>Sreyka (Teacher)</span>
            <button class="play-btn" type="button">▶</button>
          </div>

          <div class="voice-item" data-voice="Zephyr" data-name="Chenda">
            <span>Chenda (Cinematic)</span>
            <button class="play-btn" type="button">▶</button>
          </div>

        </div>

        <div class="counter">
          <span id="charCount">0</span>/50000
        </div>
      </div>

      <textarea
        id="text"
        maxlength="50000"
        placeholder="Type or paste your text here to generate speech..."
      ></textarea>

      <div id="status"></div>

    </section>

    <section class="right-panel">

      <div id="resultList" class="result-list"></div>

      <button id="btn" class="generate-btn" type="button">
        Generate Speech
      </button>

    </section>

  </div>

</div>

<script src="./js/script.js"></script>

</body>
</html>
