<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <title>Generate Speech</title>

  <link rel="stylesheet" href="./style/style.css" />
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <h1>Generate Speech</h1>

    <div class="top-actions">
      <span>🌐 EN</span>
      <span>⚙</span>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main-layout">

    <!-- LEFT PANEL -->
    <section class="left-panel">

      <div class="voice-row">
        <label>Character Voice</label>

        <!-- CUSTOM DROPDOWN VOICE SELECT -->
        <div class="voice-dropdown" id="voiceDropdown">

          <div class="voice-selected" id="voiceSelected">
            <span id="selectedVoiceName">Bora (Calm)</span>
            <span class="arrow">▼</span>
          </div>

          <div class="voice-menu" id="voiceMenu">

            <div class="voice-group-title">Khmer Male Voices</div>

            <div class="voice-option active" data-voice="Kore" data-name="Bora (Calm)">
              <span>Bora (Calm)</span>
              <button class="play-btn" type="button">▶</button>
            </div>

            <div class="voice-option" data-voice="Puck" data-name="Tola (Deep)">
              <span>Tola (Deep)</span>
              <button class="play-btn" type="button">▶</button>
            </div>

            <div class="voice-option" data-voice="Charon" data-name="Dara (Energetic)">
              <span>Dara (Energetic)</span>
              <button class="play-btn" type="button">▶</button>
            </div>

            <div class="voice-option" data-voice="Fenrir" data-name="Sokha (Wise)">
              <span>Sokha (Wise)</span>
              <button class="play-btn" type="button">▶</button>
            </div>

            <div class="voice-option" data-voice="Orus" data-name="Rithy (Reporter)">
              <span>Rithy (Reporter)</span>
              <button class="play-btn" type="button">▶</button>
            </div>

            <div class="voice-group-title">Khmer Female Voices</div>

            <div class="voice-option" data-voice="Leda" data-name="Theary (Warm)">
              <span>Theary (Warm)</span>
              <button class="play-btn" type="button">▶</button>
            </div>

            <div class="voice-option" data-voice="Aoede" data-name="Maly (Emotional)">
              <span>Maly (Emotional)</span>
              <button class="play-btn" type="button">▶</button>
            </div>

            <div class="voice-option" data-voice="Callirrhoe" data-name="Nary (Elegant)">
              <span>Nary (Elegant)</span>
              <button class="play-btn" type="button">▶</button>
            </div>

            <div class="voice-option" data-voice="Autonoe" data-name="Sreyka (Teacher)">
              <span>Sreyka (Teacher)</span>
              <button class="play-btn" type="button">▶</button>
            </div>

            <div class="voice-option" data-voice="Zephyr" data-name="Chenda (Cinematic)">
              <span>Chenda (Cinematic)</span>
              <button class="play-btn" type="button">▶</button>
            </div>

          </div>
        </div>

        <div class="counter">
          <span id="charCount">0</span>/50000
        </div>
      </div>

      <!-- TEXT INPUT -->
      <textarea
        id="text"
        maxlength="50000"
        placeholder="Type or paste your text here to generate speech..."
      ></textarea>

      <!-- STATUS -->
      <div id="status"></div>

    </section>

    <!-- RIGHT PANEL -->
    <section class="right-panel">

      <div id="resultList" class="result-list"></div>

      <button id="btn" class="generate-btn" type="button">
        Generate Speech
      </button>

    </section>

  </div>

</div>

<script src="./js/script.js"></script>

</body>
</html>
